<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GST Master — Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1e293b; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { color: #f8fafc; font-size: 28px; font-weight: 800; }
    .logo p { color: #94a3b8; font-size: 14px; margin-top: 6px; }
    label { display: block; color: #cbd5e1; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 20px; }
    input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 15px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #6366f1; }
    .btn { width: 100%; margin-top: 28px; padding: 14px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #475569; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
    .links { margin-top: 24px; text-align: center; }
    .links a { color: #6366f1; font-size: 13px; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>GST Master</h1>
      <p>Unified GST Automation Workspace</p>
    </div>
    <label for="email">Email address</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="username" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    <button class="btn" id="loginBtn" type="button">Login</button>
    <div class="msg" id="message"></div>
    <div class="links">
      <a href="gstr1.html">GSTR-1 to Tally</a> &nbsp;|&nbsp;
      <a href="gstr2b.html">GSTR-2B Automation</a> &nbsp;|&nbsp;
      <a href="gstr3b.html">GSTR-3B Aggregator</a>
    </div>
  </div>
  <script>
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const messageEl = document.getElementById('message');

    function showMessage(msg, isError = false) {
      messageEl.textContent = msg;
      messageEl.style.color = isError ? '#ef4444' : '#22c55e';
    }

    async function handleLogin() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) { showMessage('Enter email and password.', true); return; }
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { showMessage(error.message, true); return; }
        showMessage('Login successful. Redirecting...');
        window.location.href = './gstr1.html';
      } catch (err) {
        showMessage(err.message || 'Login failed.', true);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    supabaseClient.auth.getSession().then(({ data }) => {
      if (data?.session) window.location.href = './gstr1.html';
    });
  </script>
</body>
</html>
